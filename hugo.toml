baseURL = 'https://chandrashaker.in/'
languageCode = 'en-in'
title = 'Chandra Shaker - Tech, Finance & Career Insights'
theme = 'mainroad'
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = false
googleAnalytics = 'G-BFT23S4QJ3'
copyright = "© 2026 Chandra Shaker · [Privacy Policy](/privacy-policy/) · [Disclaimer](/disclaimer/) · [Contact](/contact/)"

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[services]
  [services.googleAnalytics]
    ID = 'G-BFT23S4QJ3'

[params]
  description = "Technology news, US stock market analysis, and engineering career guidance"
  keywords = ["AI", "Machine Learning", "US Stocks", "Engineering Jobs", "IoT"]
  author = "Chandra Shaker"
  dateformat = "January 2, 2006"
  opengraph = true
  twitter_cards = true
  readmore = true
  authorbox = false
  pager = true
  post_meta = ["date", "categories"]
  favicon = "/favicon.ico"
  customCSS = ["css/custom.css"]

  # Sidebar
  [params.sidebar]
    home = "right"
    list = "right"
    single = "right"
    widgets = ["search", "recent", "categories", "taglist"]

  # Logo
  [params.logo]
    subtitle = "Tech · Finance · Careers"

  # Social links
  [params.social]
    youtube = "https://youtube.com/@chandrasedu"
    linkedin = "https://linkedin.com/in/chandrashaker"
    github = "https://github.com/chandrashakera"

# Menu
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Blog"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "Courses"
  url = "https://courses.chandrashaker.in"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Privacy
[privacy]
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true

# Outputs
[outputs]
  home = ["HTML", "RSS"]

# Markup
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = true
    style = "monokai"