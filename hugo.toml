baseURL = 'https://chandrashaker.in/'
languageCode = 'en-in'
title = 'Chandras Edu | AI, Stock Market, Courses & Jobs India'
theme = 'mainroad'
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = false
googleAnalytics = 'G-BFT23S4QJ3'
copyright = "© 2026 Chandra Shaker · [Privacy Policy](/privacy-policy/) · [Disclaimer](/disclaimer/) · [Contact](/contact/)"

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[services]
  [services.googleAnalytics]
    ID = 'G-BFT23S4QJ3'

[params]
  description = "Latest AI and technology news, US stock market and Indian finance insights, free engineering courses, and tech, government & private sector job opportunities for Indian professionals and students."
  keywords = [
    "AI news India",
    "stock market India",
    "US stocks for Indians",
    "engineering courses online",
    "AI ML course India",
    "tech jobs India",
    "government jobs India",
    "embedded systems course",
    "Python course free",
    "finance tips India",
    "Indian IT stocks",
    "cryptocurrency India"
  ]
  author = "Chandra Shaker"
  dateformat = "January 2, 2006"
  opengraph = true
  twitter_cards = true
  readmore = true
  authorbox = false
  pager = true
  post_meta = ["date", "categories"]
  favicon = "/favicon.ico"
  customCSS = ["css/custom.css"]
  mainSections = ["posts"]

  # Sidebar
  [params.sidebar]
    home = "right"
    list = "right"
    single = "right"
    widgets = ["search", "recent", "categories", "taglist"]

  # Logo
  [params.logo]
    subtitle = "Tech · Finance · Courses · Jobs"

  # Social links
  [params.social]
    youtube = "https://youtube.com/@chandrasedu"
    linkedin = "https://linkedin.com/in/chandrashaker"
    github = "https://github.com/chandrashakera"

# Menu
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Blog"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "Courses"
  url = "/courses/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Privacy
[privacy]
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true

# Outputs
[outputs]
  home = ["HTML", "RSS"]

# Markup
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = true
    style = "monokai"